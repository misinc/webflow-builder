[build]
command = "npm run build"
functions = "netlify/functions"

[functions]
node_bundler = "esbuild"

[[redirects]]
from = "/api/repos/connect"
to = "/.netlify/functions/repos-connect"
status = 200

[[redirects]]
from = "/api/repos/:repoId/sync"
to = "/.netlify/functions/repos-sync/:repoId"
status = 200

[[redirects]]
from = "/api/repos/:repoId/tree"
to = "/.netlify/functions/repos-tree/:repoId"
status = 200

[[redirects]]
from = "/api/webflow/bind-site"
to = "/.netlify/functions/webflow-bind-site"
status = 200

[[redirects]]
from = "/api/build/plan"
to = "/.netlify/functions/build-plan"
status = 200

[[redirects]]
from = "/api/build/jobs"
to = "/.netlify/functions/build-jobs-create"
status = 200

[[redirects]]
from = "/api/build/jobs/:id/complete"
to = "/.netlify/functions/build-jobs-complete/:id"
status = 200

[[redirects]]
from = "/api/build/jobs/:id"
to = "/.netlify/functions/build-jobs-get/:id"
status = 200

[[redirects]]
from = "/api/debug/env-status"
to = "/.netlify/functions/debug-env-status"
status = 200

[[redirects]]
from = "/api/v2/bootstrap"
to = "/.netlify/functions/v2-bootstrap"
status = 200

[[redirects]]
from = "/api/v2/component-opportunities"
to = "/.netlify/functions/v2-component-opportunities"
status = 200

[[redirects]]
from = "/api/workflow/site-pages"
to = "/.netlify/functions/workflow-site-pages"
status = 200

[[redirects]]
from = "/api/workflow/page-mappings"
to = "/.netlify/functions/workflow-page-mappings-get"
status = 200
conditions = {Method = ["GET", "OPTIONS"]}

[[redirects]]
from = "/api/workflow/page-mappings"
to = "/.netlify/functions/workflow-page-mappings-post"
status = 200
conditions = {Method = ["POST"]}

[[redirects]]
from = "/api/workflow/queue"
to = "/.netlify/functions/workflow-queue"
status = 200

[[redirects]]
from = "/api/workflow/section/analyze"
to = "/.netlify/functions/workflow-section-analyze"
status = 200

[[redirects]]
from = "/api/workflow/debug/generate-skeleton"
to = "/.netlify/functions/workflow-debug-generate-skeleton"
status = 200

[[redirects]]
from = "/api/workflow/section/generate-skeleton"
to = "/.netlify/functions/workflow-section-generate-skeleton"
status = 200

[[redirects]]
from = "/api/workflow/section/style"
to = "/.netlify/functions/workflow-section-style"
status = 200

[[redirects]]
from = "/api/workflow/section/verify"
to = "/.netlify/functions/workflow-section-verify"
status = 200

[[redirects]]
from = "/api/workflow/section/approve"
to = "/.netlify/functions/workflow-section-approve"
status = 200

[[redirects]]
from = "/api/workflow/section/skip"
to = "/.netlify/functions/workflow-section-skip"
status = 200

[[redirects]]
from = "/api/workflow/page/complete"
to = "/.netlify/functions/workflow-page-complete"
status = 200
